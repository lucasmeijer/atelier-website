<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>atelier — made for humans</title>
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <img class="logo" src="logo.png" alt="atelier — made for humans" />

  <!-- video (placeholder) -->
  <div class="video" role="button" aria-label="Play intro video">
    <div class="play"></div>
    <span class="label">watch the demo</span>
  </div>

  <!-- waitlist signup -->
  <div class="waitlist">
    <p class="hint">Sign up for the waitlist.</p>
    <form id="waitlist-form" class="signup"
          action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="f2a351b6-14b2-4641-b5fd-ffd2afa015d2" />
      <input type="hidden" name="subject" value="New atelier waitlist signup" />
      <input type="checkbox" name="botcheck" class="hidden" style="display:none" />
      <input type="email" name="email" id="email" required
             placeholder="you@example.com" autocomplete="email" />
      <button type="submit" class="submit">Join</button>
    </form>
    <p class="signup-msg" id="signup-msg" hidden></p>
  </div>


  <script>
    const form = document.getElementById('waitlist-form');
    const msg = document.getElementById('signup-msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('.submit');
      if (!form.email.value) return;
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' },
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'failed');
        form.hidden = true;
        msg.textContent = "You're on the list. We'll be in touch.";
        msg.classList.add('ok');
        msg.hidden = false;
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Join';
        msg.textContent = 'Something went wrong \u2014 please try again.';
        msg.classList.add('err');
        msg.hidden = false;
      }
    });
  </script>
</body>
</html>
